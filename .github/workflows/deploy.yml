name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: paoding-local-deploy
  cancel-in-progress: true

env:
  DEPLOY_DIR: /Users/bytedance/Code/paoding
  APP_LAUNCHD_SERVICE: com.paoding.server
  TUNNEL_LAUNCHD_SERVICE: com.paoding.tunnel
  LOCAL_HEALTH_URL: http://127.0.0.1:4177/
  PUBLIC_HEALTH_URL: https://124-221-36-36.anyip.dev:8443/paoding/
  SERVER_LOG: /tmp/paoding-server.log
  TUNNEL_LOG: /tmp/paoding-tunnel.log

jobs:
  deploy:
    runs-on: [self-hosted, macOS, paoding]
    steps:
      - name: Pull latest code into live checkout
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          git fetch origin main
          git pull --ff-only origin main

      - name: Test
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          npm test

      - name: Restart local app service
        run: |
          set -euo pipefail
          uid="$(id -u)"
          launchctl kickstart -k "gui/$uid/$APP_LAUNCHD_SERVICE"
          for i in $(seq 1 30); do
            if curl -fsS "$LOCAL_HEALTH_URL" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          tail -80 "$SERVER_LOG" || true
          exit 1

      - name: Restart cloud tunnel and verify public URL
        run: |
          set -euo pipefail
          uid="$(id -u)"
          launchctl kickstart -k "gui/$uid/$TUNNEL_LAUNCHD_SERVICE"
          for i in $(seq 1 30); do
            if curl -kfsS "$PUBLIC_HEALTH_URL" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          tail -80 "$TUNNEL_LOG" || true
          exit 1
