name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: paoding-devbox-deploy
  cancel-in-progress: true

env:
  PUBLIC_ROOT: https://124-221-36-36.anyip.dev:8443/paoding

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install runtime dependencies
        run: npm ci --omit=dev --ignore-scripts --registry=https://registry.npmjs.org --replace-registry-host=always
      - name: Test
        run: node --test
      - name: Wait for DevBox auto-deploy
        run: |
          set -euo pipefail
          for i in $(seq 1 36); do
            deployed="$(curl -kfsS "$PUBLIC_ROOT/deploy-version.txt" 2>/dev/null | tr -d '\r\n' || true)"
            if [ "$deployed" = "$GITHUB_SHA" ] && curl -kfsS "$PUBLIC_ROOT/" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "DevBox did not publish $GITHUB_SHA within 6 minutes" >&2
          exit 1
