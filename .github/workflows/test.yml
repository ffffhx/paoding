name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install runtime dependencies
        run: npm ci --omit=dev --ignore-scripts --registry=https://registry.npmjs.org --replace-registry-host=always
      - run: node --test
