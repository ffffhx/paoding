<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#E4572E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="庖丁" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="styles.css" />
<title>庖丁 · 做菜跟做</title>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><h1>庖丁</h1><span class="sub">解剖每一道菜的为什么</span></div>
  </header>

  <div class="parsebar">
    <div class="row">
      <input id="url" type="text" inputmode="url" placeholder="粘贴 B站 / 抖音 / 小红书 / YouTube 链接" />
      <button class="btn" id="parseUrl">解析</button>
    </div>
    <div class="depth" id="depth">
      <span class="depth-lbl">讲解深度</span>
      <span class="chip" data-d="beginner" role="button" tabindex="0" title="每步讲得更细、更基础，适合厨房新手">新手向</span>
      <span class="chip on" data-d="balanced" role="button" tabindex="0" title="通俗易懂、详略得当（推荐）">通俗（默认）</span>
      <span class="chip" data-d="advanced" role="button" tabindex="0" title="讲透火候/食材科学等原理，适合想深入的人">进阶原理</span>
    </div>
    <label class="vischk"><input type="checkbox" id="visChk"> 🔎 读画面字幕 <span class="muted">（视频没口播/字幕多时开，会下整段视频、较慢）</span></label>
    <label class="vischk"><input type="checkbox" id="imgChk" checked> 📸 提取画面截图 <span class="muted">（每步状态图 + 食材图，需服务端配视觉模型，会下整段视频、较慢）</span></label>
    <div class="hint">也可以 <button id="fileBtn" class="linklike">上传本地视频</button> 或 <button id="textBtn" class="linklike">粘贴文字菜谱</button>（小红书图文/公众号适用）· 解析约 1–3 分钟</div>
    <input id="file" type="file" accept="video/*,audio/*" class="hidden" />
  </div>

  <div class="tabs" role="tablist">
    <div class="tab on" data-tab="recipes" role="tab" tabindex="0">菜谱</div>
    <div class="tab" data-tab="plan" role="tab" tabindex="0">本周计划</div>
    <div class="tab" data-tab="shopping" role="tab" tabindex="0">购物清单<span id="tabShopBadge"></span></div>
    <div class="tab" data-tab="skills" role="tab" tabindex="0">技巧收藏<span id="tabSkillsBadge"></span></div>
    <div class="tab" data-tab="settings" role="tab" tabindex="0">设置</div>
  </div>

  <div class="searchrow" id="searchrow">
    <input id="search" type="search" placeholder="搜索菜名 / 食材 / 标签" />
  </div>
  <div class="filters" id="filters"></div>

  <div id="view-recipes" class="list"></div>
  <div id="view-plan" class="list hidden"></div>
  <div id="view-skills" class="list hidden"></div>
  <div id="view-shopping" class="list hidden"></div>
  <div id="view-settings" class="list hidden"></div>
</div>

<div id="toast" class="toast"></div>
<script src="app.js"></script>
</body>
</html>
